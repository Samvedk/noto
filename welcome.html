<!DOCTYPE html>
<html>
<head>
<title>Noto</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#f5f5f7;
  font-family:-apple-system, BlinkMacSystemFont;
}

/* MAIN CARD */
.container{
  text-align:center;
}

/* LOGO */
.logo{
  font-size:64px;
  font-weight:600;
  letter-spacing:2px;
}

/* SUBTITLE */
.sub{
  margin-top:5px;
  font-size:14px;
  color:#777;
}

/* TAGLINE */
.tag{
  margin-top:30px;
  font-size:18px;
  color:#444;
}

/* BUTTON */
.btn{
  margin-top:40px;
  padding:14px 30px;
  border-radius:30px;
  background:white;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  cursor:pointer;
  transition:0.2s;
}

.btn:hover{
  transform:scale(1.05);
}
</style>
</head>

<body>

<div class="container">

<div class="logo">Noto</div>
<div class="sub">by Sam.k</div>

<div class="tag">
A notebook that feels real.
</div>

<div class="btn" onclick="startApp()">
Get Started
</div>

</div>

<script>

function startApp(){
  window.location.href="grade.html";
}

</script>

</body>
</html>
