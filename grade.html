<!DOCTYPE html>
<html>
<head>
<title>Noto - Dashboard</title>

<style>
body{
  margin:0;
  font-family:-apple-system, system-ui;
  background:#f5f5f7;
  display:flex;
  justify-content:center;
}

.app{
  width:1100px;
  margin-top:20px;
}

.top{
  display:flex;
  align-items:center;
  gap:15px;
}

.icon{
  font-size:20px;
  cursor:pointer;
}

.search{
  flex:1;
  background:white;
  padding:10px 15px;
  border-radius:20px;
  color:#777;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.right{
  display:flex;
  gap:10px;
}

.filters{
  display:flex;
  gap:15px;
  margin-top:20px;
}

.dropdown{
  background:white;
  padding:12px 18px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
  cursor:pointer;
}

.grid{
  margin-top:25px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:20px;
}

.card{
  background:white;
  padding:20px;
  border-radius:20px;
  box-shadow:0 10px 20px rgba(0,0,0,0.05);
  cursor:pointer;
  transition:0.2s;
  position:relative;
}

.card:hover{
  transform:scale(1.03);
}

.card-title{
  font-size:16px;
  font-weight:500;
}

.tag{
  font-size:12px;
  color:#888;
  margin-top:5px;
}

/* MENU BUTTON */
.menu-btn{
  position:absolute;
  top:10px;
  right:10px;
  font-size:18px;
  cursor:pointer;
}

/* POPUP MENU */
.popup{
  position:absolute;
  top:35px;
  right:10px;
  background:white;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  padding:5px;
  display:none;
  z-index:10;
}

.popup div{
  padding:8px 12px;
  cursor:pointer;
}

.popup div:hover{
  background:#eee;
}
</style>
</head>

<body>

<div class="app">

<div class="top">
<div class="icon">🏠</div>
<div class="icon">👤</div>

<div class="search">Search notes, formulas...</div>

<div class="right">
<div class="icon" onclick="addGrade()">＋</div>
<div class="icon">⛶</div>
</div>
</div>

<div class="filters">
<div class="dropdown">All Folders</div>
<div class="dropdown" onclick="addGrade()">📁 New Folder</div>
</div>

<div class="grid" id="grid"></div>

</div>

<script>

let grades = JSON.parse(localStorage.getItem("grades")) || [];

function save(){
  localStorage.setItem("grades", JSON.stringify(grades));
}

function render(){
  grid.innerHTML="";

  grades.forEach((g,i)=>{

    let div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <div class="menu-btn" onclick="toggleMenu(event, ${i})">⋯</div>

      <div class="popup" id="menu-${i}">
        <div onclick="renameGrade(${i})">Rename</div>
        <div onclick="deleteGrade(${i})">Delete</div>
      </div>

      <div class="card-title">${g.name}</div>
      ${g.extra ? `<div class="tag">Extracurricular</div>` : ""}
    `;

    div.onclick=()=>{
      localStorage.setItem("currentGrade", g.name);
      window.location.href="subject.html";
    };

    grid.appendChild(div);
  });
}

/* MENU */
function toggleMenu(e,i){
  e.stopPropagation();

  document.querySelectorAll(".popup").forEach(p=>p.style.display="none");

  let menu = document.getElementById(`menu-${i}`);
  menu.style.display = "block";
}

document.addEventListener("click", ()=>{
  document.querySelectorAll(".popup").forEach(p=>p.style.display="none");
});

/* ACTIONS */
function renameGrade(i){
  let n = prompt("New name");
  if(n){
    grades[i].name = n;
    save();
    render();
  }
}

function deleteGrade(i){
  let confirmText = prompt("Type DELETE to confirm");

  if(confirmText === "DELETE"){
    grades.splice(i,1);
    save();
    render();
  } else {
    alert("Deletion cancelled");
  }
}

/* ADD */
function addGrade(){
  let name = prompt("Enter folder name");
  if(!name) return;

  let extra = confirm("Is this extracurricular?");
  grades.push({name, extra});

  save();
  render();
}

render();

</script>

</body>
</html>
